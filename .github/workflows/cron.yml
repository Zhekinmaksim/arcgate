name: Webhook Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook worker
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET https://arcgate.xyz/api/webhook-worker \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
